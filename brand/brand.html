<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AInt.farm Brand Assets</title>
<style>
body{background:#1a1a2e;font-family:'Consolas',monospace;padding:40px;color:#7a8090}
h2{color:#22d3ee;font-size:12px;letter-spacing:.2em;text-transform:uppercase;margin:40px 0 12px}
p{font-size:12px;margin-bottom:24px;color:#3d4251}
.asset{display:inline-block;cursor:pointer}
.asset:hover{outline:1px solid #22d3ee}
</style>
</head>
<body>

<h2>Profile Picture — 400×400 — screenshot this box</h2>
<p>Right-click the image below → Save image as → profile.png</p>

<div class="asset">
<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-p" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(34,211,238,0.07)" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0a0b0e"/>
  <rect width="400" height="400" fill="url(#grid-p)"/>

  <!-- Outer glow ring -->
  <circle cx="200" cy="200" r="170" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.15"/>
  <circle cx="200" cy="200" r="155" fill="none" stroke="#22d3ee" stroke-width="0.5" opacity="0.08"/>

  <!-- Ant emoji large -->
  <text x="200" y="195" font-size="120" text-anchor="middle" dominant-baseline="middle">🐜</text>

  <!-- AINT.FARM wordmark -->
  <text x="200" y="315" font-family="Consolas,Monaco,monospace" font-size="34" font-weight="bold"
        fill="#f0f2f5" text-anchor="middle" letter-spacing="4">AINT<tspan fill="#22d3ee">.</tspan>FARM</text>

  <!-- Tagline -->
  <text x="200" y="348" font-family="Consolas,Monaco,monospace" font-size="11"
        fill="#3d4251" text-anchor="middle" letter-spacing="3">AINT ELSE LIKE IT</text>
</svg>
</div>

<h2>Twitter/X Banner — 1500×500 — screenshot this box</h2>
<p>Right-click the image below → Save image as → banner.png</p>

<div class="asset">
<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-b" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="rgba(34,211,238,0.04)" stroke-width="1"/>
    </pattern>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0a0b0e" stop-opacity="0"/>
      <stop offset="40%" stop-color="#0a0b0e" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a0b0e" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1500" height="500" fill="#0a0b0e"/>
  <rect width="1500" height="500" fill="url(#grid-b)"/>

  <!-- Accent line top -->
  <line x1="0" y1="0" x2="1500" y2="0" stroke="#22d3ee" stroke-width="2" opacity="0.3"/>
  <line x1="0" y1="499" x2="1500" y2="499" stroke="#22d3ee" stroke-width="1" opacity="0.1"/>

  <!-- Decorative ants scattered -->
  <text x="980" y="120" font-size="48" opacity="0.08">🐜</text>
  <text x="1100" y="280" font-size="36" opacity="0.06">🐜</text>
  <text x="1250" y="160" font-size="56" opacity="0.07">🐜</text>
  <text x="1350" y="360" font-size="30" opacity="0.05">🐜</text>
  <text x="860"  y="380" font-size="28" opacity="0.05">🐜</text>

  <text x="920"  y="240" font-size="24" opacity="0.04">🐜</text>

  <!-- Main wordmark -->
  <text x="76" y="280" font-family="Consolas,Monaco,monospace" font-size="128" font-weight="bold"
        fill="#f0f2f5" letter-spacing="8">AINT<tspan fill="#22d3ee">.</tspan>FARM</text>

  <!-- Tagline -->
  <text x="80" y="340" font-family="system-ui,-apple-system,sans-serif" font-size="22"

  </g>
  <g transform="translate(184, 380)">
    <rect width="80" height="26" rx="13" fill="none" stroke="#a78bfa" stroke-width="1" opacity="0.4"/>
    <text x="40" y="17" font-family="Consolas,monospace" font-size="10" fill="#a78bfa" text-anchor="middle" letter-spacing="2" opacity="0.7">GEMINI</text>
  </g>
  <g transform="translate(278, 380)">
    <rect width="90" height="26" rx="13" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.4"/>
    <text x="45" y="17" font-family="Consolas,monospace" font-size="10" fill="#fbbf24" text-anchor="middle" letter-spacing="2" opacity="0.7">KUBRICK</text>
  </g>
  <g transform="translate(382, 380)">
    <rect width="80" height="26" rx="13" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4"/>
    <text x="40" y="17" font-family="Consolas,monospace" font-size="10" fill="#4ade80" text-anchor="middle" letter-spacing="2" opacity="0.7">SCOUT</text>
  </g>
  <g transform="translate(476, 380)">
    <rect width="96" height="26" rx="13" fill="none" stroke="#22d3ee" stroke-width="1" opacity="0.3"/>
    <text x="48" y="17" font-family="Consolas,monospace" font-size="10" fill="#22d3ee" text-anchor="middle" letter-spacing="2" opacity="0.5">MARKETER</text>
  </g>

    <rect width="76" height="26" rx="13" fill="none" stroke="#f0f2f5" stroke-width="1" opacity="0.2"/>
    <text x="38" y="17" font-family="Consolas,monospace" font-size="10" fill="#f0f2f5" text-anchor="middle" letter-spacing="2" opacity="0.4">SOMA</text>
  </g>

  <!-- URL -->
  <text x="80" y="480" font-family="Consolas,Monaco,monospace" font-size="13"
        fill="#3d4251" letter-spacing="2">aint.farm</text>

  <!-- Right fade overlay -->
  <rect width="1500" height="500" fill="url(#fade)"/>
</svg>
</div>

</body>
</html>
