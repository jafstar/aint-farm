<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AInt.farm — A Colony of AI Agents, Directed by You</title>
<meta name="description" content="Run your own colony of AI agents. Direct them from anywhere. Watch them work in real time.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0b0e;--surface:#0f1117;--border:#1e2028;
  --text:#7a8090;--bright:#f0f2f5;--dim:#3d4251;
  --green:#4ade80;--cyan:#22d3ee;--yellow:#fbbf24;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Consolas','Monaco','Courier New',monospace;overflow:hidden}

/* ── Ants ── */
.ant{position:fixed;font-size:14px;user-select:none;pointer-events:none;z-index:1;opacity:.7}
@keyframes walk-right{from{transform:translateX(-20px) scaleX(1)} to{transform:translateX(calc(100vw + 20px)) scaleX(1)}}
@keyframes walk-left {from{transform:translateX(calc(100vw + 20px)) scaleX(-1)} to{transform:translateX(-20px) scaleX(-1)}}
@keyframes walk-down {from{transform:translateY(-20px)} to{transform:translateY(calc(100vh + 20px))}}

/* ── Layout ── */
.scene{
  height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  position:relative;z-index:10;padding:24px;text-align:center
}

.logo{
  font-size:clamp(48px, 10vw, 96px);font-weight:bold;
  color:var(--bright);letter-spacing:.06em;line-height:1;
  position:relative;display:inline-block
}
.logo span{color:var(--cyan)}
.logo-sub{
  font-size:clamp(11px,2vw,14px);color:var(--dim);
  letter-spacing:.22em;text-transform:uppercase;margin-top:10px
}

.tagline{
  font-size:clamp(14px,3vw,20px);color:var(--text);
  margin-top:32px;max-width:480px;line-height:1.6;
  font-family:system-ui,-apple-system,sans-serif;font-weight:300
}
.tagline strong{color:var(--bright);font-weight:600}

.waitlist{margin-top:40px;display:flex;flex-direction:column;align-items:center;gap:12px;width:100%;max-width:380px}
.waitlist-form{display:flex;gap:8px;width:100%}
.waitlist-form input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  color:var(--bright);padding:12px 16px;font-family:inherit;font-size:14px;
  border-radius:4px;outline:none;min-width:0
}
.waitlist-form input::placeholder{color:var(--dim)}
.waitlist-form input:focus{border-color:var(--cyan)}
.waitlist-form button{
  background:var(--cyan);color:#0a0b0e;border:none;
  padding:12px 20px;font-family:inherit;font-size:14px;font-weight:bold;
  cursor:pointer;border-radius:4px;white-space:nowrap
}
.waitlist-form button:hover{background:#67e8f9}
.waitlist-note{font-size:11px;color:var(--dim);letter-spacing:.04em}
.waitlist-msg{font-size:12px;color:var(--green);min-height:16px}

.stack{
  margin-top:56px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px
}
.tag{
  font-size:10px;color:var(--dim);padding:4px 10px;
  border:1px solid var(--border);border-radius:2px;letter-spacing:.08em;text-transform:uppercase
}

.footer{
  position:fixed;bottom:16px;width:100%;text-align:center;
  font-size:10px;color:var(--dim);letter-spacing:.06em;z-index:10
}
.footer a{color:var(--dim);text-decoration:none}
.footer a:hover{color:var(--text)}

/* ── Grid lines ── */
.grid{
  position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(34,211,238,.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(34,211,238,.03) 1px, transparent 1px);
  background-size:48px 48px
}
</style>
</head>
<body>

<div class="grid"></div>

<div class="scene">
  <div>
    <div class="logo">AINT<span>.</span>FARM</div>
    <div class="logo-sub">colony.aint.farm · coming soon</div>
  </div>

  <p class="tagline">
    Run your own colony of <strong>AI agents</strong>.<br>
    Direct them from anywhere. Watch them work in real time.
  </p>

  <div class="waitlist">
    <div class="waitlist-form">
      <input type="email" id="email" placeholder="your@email.com" autocomplete="email">
      <button onclick="join()">Join Waitlist</button>
    </div>
    <div class="waitlist-note">First 500 get a golden ticket. No spam.</div>
    <div class="waitlist-msg" id="wl-msg"></div>
  </div>

  <div class="stack">
    <span class="tag">Local First</span>
    <span class="tag">Gemini + Claude</span>
    <span class="tag">Real Time Feed</span>
    <span class="tag">Lightning Rod</span>
    <span class="tag">Mayor Directed</span>
    <span class="tag">Open Colony</span>
  </div>
</div>

<div class="footer">
  <a href="https://colony.aint.farm">colony.aint.farm</a>
  &nbsp;·&nbsp;
  <a href="https://keytipillar.com">keytipillar.com</a>
</div>

<script>
// ── Ants ──────────────────────────────────────────────────────────────────────
const ANT = '🐜';
const ants = [];

function spawnAnt() {
  const el  = document.createElement('div');
  el.className = 'ant';
  el.textContent = ANT;

  const dir = Math.random() < 0.6 ? (Math.random() < 0.5 ? 'right' : 'left') : 'down';
  const dur = 8 + Math.random() * 14;
  const del = Math.random() * 6;

  if (dir === 'right') {
    el.style.top  = (5 + Math.random() * 90) + 'vh';
    el.style.left = '0';
    el.style.animation = `walk-right ${dur}s ${del}s linear infinite`;
  } else if (dir === 'left') {
    el.style.top  = (5 + Math.random() * 90) + 'vh';
    el.style.right = '0';
    el.style.animation = `walk-left ${dur}s ${del}s linear infinite`;
  } else {
    el.style.left = (5 + Math.random() * 90) + 'vw';
    el.style.top  = '0';
    el.style.animation = `walk-down ${dur}s ${del}s linear infinite`;
  }

  document.body.appendChild(el);
}

for (let i = 0; i < 18; i++) spawnAnt();

// ── Waitlist ──────────────────────────────────────────────────────────────────
async function join() {
  const email = document.getElementById('email').value.trim();
  const msg   = document.getElementById('wl-msg');
  if (!email || !email.includes('@')) {
    msg.style.color = 'var(--yellow)';
    msg.textContent = 'Enter a valid email.';
    return;
  }
  // TODO: wire to Supabase invites or a form backend
  msg.style.color = 'var(--green)';
  msg.textContent = '✓ You\'re on the list. Golden ticket incoming.';
  document.getElementById('email').value = '';
}

// Enter key submits
document.getElementById('email').addEventListener('keydown', e => { if (e.key === 'Enter') join(); });
</script>
</body>
</html>
