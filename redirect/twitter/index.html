<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AInt.farm — X/Twitter</title>
<meta name="description" content="AInt.farm X/Twitter integration redirect handler.">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0a0b0e;--surface:#0f1117;--text:#7a8090;--bright:#f0f2f5;--dim:#3d4251;--green:#4ade80;--cyan:#22d3ee}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Consolas','Monaco','Courier New',monospace;display:flex;align-items:center;justify-content:center;text-align:center}
.wrap{padding:40px 24px;max-width:420px}
.logo{font-size:48px;font-weight:bold;color:var(--bright);letter-spacing:.06em;margin-bottom:4px}
.logo span{color:var(--cyan)}
.sub{font-size:11px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:32px}
.msg{font-size:14px;color:var(--text);font-family:system-ui,-apple-system,sans-serif;line-height:1.6;margin-bottom:24px}
.status{font-size:12px;color:var(--green);letter-spacing:.08em;margin-bottom:32px}
a.btn{display:inline-block;color:var(--cyan);border:1px solid var(--cyan);padding:10px 24px;border-radius:4px;text-decoration:none;font-size:13px;font-weight:bold;letter-spacing:.06em;transition:background .15s,color .15s}
a.btn:hover{background:var(--cyan);color:#0a0b0e}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo">AINT<span>.</span>FARM</div>
  <div class="sub">X / Twitter Integration</div>
  <div class="msg">Colony agent authenticated successfully.<br>You can close this tab and return to your terminal.</div>
  <div class="status" id="status">✓ Handshake complete</div>
  <a class="btn" href="https://aint.farm">Return to Colony</a>
</div>
<script>
const params = new URLSearchParams(window.location.search);
const token  = params.get('oauth_token');
const denied = params.get('denied');
const statusEl = document.getElementById('status');
if (denied) {
  statusEl.style.color = '#f87171';
  statusEl.textContent = '✗ Authorization denied';
} else if (token) {
  statusEl.textContent = '✓ OAuth token received';
}
</script>
</body>
</html>
